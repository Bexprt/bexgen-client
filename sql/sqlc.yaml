version: "2"
sql:
  - engine: "postgresql"
    queries: "query.sql"
    schema: "schema.sql"
    gen:
      go:
        package: "sql"
        out: "../pkg/database/sql"
        sql_package: "pgx/v5"

        emit_json_tags: true
        emit_interface: true
        emit_prepared_queries: true
        emit_pointers_for_null_types: true

        overrides:
          # =========================
          # UUID
          # =========================
          - db_type: "uuid"
            go_type:
              import: "github.com/google/uuid"
              type: "UUID"

          - db_type: "uuid"
            nullable: true
            go_type:
              import: "github.com/google/uuid"
              type: "UUID"

          # =========================
          # TEXT
          # =========================
          - db_type: "text"
            go_type: "string"

          - db_type: "text"
            nullable: true
            go_type: "string"

          - db_type: "varchar"
            go_type: "string"

          - db_type: "varchar"
            nullable: true
            go_type: "string"

          # =========================
          # FLOAT
          # =========================
          - db_type: "float8"
            go_type: "float64"

          - db_type: "float8"
            nullable: true
            go_type: "float64"

          - db_type: "float4"
            go_type: "float32"

          - db_type: "float4"
            nullable: true
            go_type: "float32"

          # =========================
          # INT
          # =========================
          - db_type: "int4"
            go_type: "int32"

          - db_type: "int8"
            go_type: "int64"

          # =========================
          # BOOL
          # =========================
          - db_type: "bool"
            go_type: "bool"

          # =========================
          # TIME
          # =========================
          - db_type: "timestamptz"
            go_type:
              import: "time"
              type: "Time"

          - db_type: "timestamp"
            go_type:
              import: "time"
              type: "Time"

          - db_type: "date"
            go_type:
              import: "time"
              type: "Time"

          # =========================
          # JSON
          # =========================
          - db_type: "jsonb"
            go_type:
              import: "encoding/json"
              type: "RawMessage"

          - db_type: "jsonb"
            nullable: true
            go_type:
              import: "encoding/json"
              type: "RawMessage"

          # =========================
          # BYTEA
          # =========================
          - db_type: "bytea"
            go_type:
              type: "[]byte"

          - db_type: "bytea"
            nullable: true
            go_type:
              type: "[]byte"

          # =========================
          # ARRAYS
          # =========================
          - db_type: "float4[]"
            go_type:
              type: "[]float32"

          - db_type: "text[]"
            go_type:
              type: "[]string"

          # =========================
          # ENUMS
          # =========================
          - db_type: "processing_state"
            go_type: "string"

          - db_type: "retry_state"
            go_type: "string"

          # =========================
          # PGVECTOR (IMPORTANT)
          # =========================
          - db_type: "vector"
            go_type:
              type: "[]float32"
